<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- ✅ RESPONSIVE VIEWPORT (VERY IMPORTANT) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NovaWear - Clothing Brand</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="header">
    <h1 class="logo">NovaWear</h1>

    <nav class="nav">
      <a href="#home">Home</a>
      <a href="#collection">Collection</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero" id="home">
    <div class="hero-text">
      <h2>Style Redefined</h2>
      <p>Modern fashion for bold personalities.</p>
      <button>Shop Now</button>
    </div>
  </section>

  <section class="collection" id="collection">
    <h2>New Collection</h2>

    <div class="product-grid">
      <div class="product-card">Hoodies</div>
      <div class="product-card">T-Shirts</div>
      <div class="product-card">Jeans</div>
      <div class="product-card">Jackets</div>
    </div>
  </section>

  <section class="about" id="about">
    <div class="about-container">
      <div class="about-text">
        <h2>About NovaWear</h2>
        <p>We design modern streetwear for everyday confidence.</p>
      </div>

      <div class="about-image"></div>
    </div>
  </section>

  <section class="contact" id="contact">
    <h2>Contact Us</h2>

    <form>
      <input type="text" placeholder="Your Name" />
      <input type="email" placeholder="Your Email" />
      <textarea placeholder="Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <footer class="footer">
    <p>&copy; 2026 NovaWear</p>
  </footer>

</body>
</html>
